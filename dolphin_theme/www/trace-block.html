{% raw %}
<style>
:root{--navy:#16304F;--gold:#D4A24A}
#tbapp{font-family:inherit;max-width:820px;margin:0 auto;padding:10px 14px;color:#1f2a3a}
#tbapp .hd{background:var(--navy);color:#fff;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--gold)}
#tbapp .hd .ic{width:44px;height:44px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:20px}
#tbapp h1{font-size:19px;margin:0}
#tbapp .sub{font-size:12px;opacity:.85;margin-top:2px}
#tbapp .sbx{display:flex;gap:8px;margin:14px 0}
#tbapp input{flex:1;padding:10px 12px;border:1px solid #cfd4dc;border-radius:8px;font-size:15px}
#tbapp .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-top:8px}
#tbapp .doc{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e5e7eb;border-left:3px solid #888;border-radius:8px;padding:10px 12px;margin-bottom:7px}
#tbapp .doc .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:#8a929c}
#tbapp .doc .nm{font-weight:600;font-size:14px}
#tbapp a.eye{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px;border-radius:12px;border:1px solid #185fa5;color:#185fa5;text-decoration:none;white-space:nowrap}
#tbapp .badge{font-size:12px;padding:2px 10px;border-radius:12px;font-weight:600}
#tbapp .empty{padding:22px;text-align:center;color:#888}
</style>
<div id="tbapp">
  <div class="hd"><div class="ic">&#9678;</div><div><h1>Trace a block</h1><div class="sub">Dolphin International &middot; type any block number or export no to see where it is</div></div></div>
  <div class="sbx"><input id="q" placeholder="Block number or export no&hellip;" autofocus></div>
  <div id="result"><div class="empty">Enter a block number above.</div></div>
</div>
<script>
(function(){
  var SC={'In Stock':['#eaf3de','#3b6d11'],'Buyer Marked':['#faeeda','#854f0b'],'In Delivery Challan':['#e6f1fb','#0c447c'],'Dispatched/Transported':['#e6f1fb','#0c447c'],'At Port':['#eeedfe','#3c3489'],'At Bannikoppa Station yard':['#eeedfe','#3c3489'],'Shipped':['#e1f5ee','#0f6e56'],'Sold':['#f1efe8','#444441']};
  var FL=['name','block_number','export_block_no','status','delivery_challan','buyer_inspection','source_quarry_inspection','granite_quality_grade','length_gross','width_gross','height_gross','gross_volume'];
  function api(filters){var u='/api/method/frappe.client.get_list?doctype=Quarry Block&filters='+encodeURIComponent(JSON.stringify(filters))+'&fields='+encodeURIComponent(JSON.stringify(FL))+'&limit_page_length=5';return fetch(u,{credentials:'include'}).then(function(r){return r.json();}).then(function(j){return j.message||[];});}
  function pdf(dt,nm,fmt){return '/api/method/frappe.utils.print_format.download_pdf?doctype='+encodeURIComponent(dt)+'&name='+encodeURIComponent(nm)+'&format='+encodeURIComponent(fmt)+'&no_letterhead=0';}
  function esc(s){return (s==null?'':(''+s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function docRow(kind,label,dt,nm,fmt,color){
    var eye=nm?'<a class="eye" style="border-color:'+color+';color:'+color+'" href="'+pdf(dt,nm,fmt)+'" target="_blank">&#128065; PDF</a>':'';
    var nmh=nm?esc(nm):'<span style="color:#8a929c">&mdash; not yet</span>';
    return '<div class="doc" style="border-left-color:'+color+'"><div><div class="lbl">'+label+'</div><div class="nm">'+nmh+'</div></div>'+eye+'</div>';
  }
  function render(q,bl){
    var R=document.getElementById('result');
    if(!bl.length){R.innerHTML='<div class="empty">No block <b>'+esc(q)+'</b> found.</div>';return;}
    R.innerHTML=bl.map(function(b){
      var sc=SC[b.status]||['#f1efe8','#444441'];
      var dim=(b.length_gross||'')+'&times;'+(b.width_gross||'')+'&times;'+(b.height_gross||'');
      var cbm=b.gross_volume?(' &middot; '+(+b.gross_volume).toFixed(2)+' cbm'):'';
      return '<div class="card"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px">'
        +'<span style="font-size:20px;font-weight:700">Block '+esc(b.block_number||b.name)+'</span>'
        +'<span style="font-size:12px;color:#6b7280">'+esc(b.granite_quality_grade||'')+' &middot; '+dim+cbm+(b.export_block_no?(' &middot; exp '+esc(b.export_block_no)):'')+'</span>'
        +'<span class="badge" style="margin-left:auto;background:'+sc[0]+';color:'+sc[1]+'">&#128205; '+esc(b.status||'')+'</span></div>'
        +docRow('QI','Quarry inspection','Quarry Inspection',b.source_quarry_inspection,'Quarry Inspection - Report','#1d9e75')
        +docRow('BI','Buyer inspection','Buyer Inspection',b.buyer_inspection,'Buyer Inspection - Report','#185fa5')
        +docRow('DC','Delivery challan','Delivery Challan',b.delivery_challan,'Dolphin Delivery Challan','#7f77dd')
        +'</div>';
    }).join('');
  }
  var t=null;
  function go(){var q=document.getElementById('q').value.trim();if(!q){document.getElementById('result').innerHTML='<div class="empty">Enter a block number above.</div>';return;}
    api([['block_number','=',q]]).then(function(bl){ if(bl.length) return bl; return api([['export_block_no','=',q]]); }).then(function(bl){ render(q,bl); }).catch(function(e){document.getElementById('result').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>';});
  }
  document.getElementById('q').addEventListener('input',function(){clearTimeout(t);t=setTimeout(go,350);});
})();
</script>
{% endraw %}
