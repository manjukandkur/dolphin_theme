{% raw %}
<style>
:root{--navy:#3a5a86;--gold:#D4A24A}
#pr{font-family:inherit;max-width:1180px;margin:0 auto;padding:8px 12px;color:#1f2a3a}
#pr .hd{background:var(--navy);color:#fff;border-radius:12px 12px 0 0;padding:12px 16px;border-bottom:3px solid var(--gold);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#pr .hd h1{font-size:16px;margin:0;font-weight:600;flex:1}
#pr .chip{font-size:11px;padding:3px 9px;border-radius:20px;background:#2f4a70;border:1px solid rgba(255,255,255,.25);color:#e6ecf3}
#pr .tb{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 14px;border:0.5px solid #e5e7eb;border-top:none;background:#fff}
#pr input,#pr select{padding:7px 9px;border:1px solid #cfd4dc;border-radius:6px;font-size:12px}
#pr .fl{font-size:12px;padding:4px 11px;border-radius:20px;background:#f1f3f6;color:#5f6b7a;cursor:pointer}
#pr .fl.on{background:#eaf0f7;color:#16304F;font-weight:600}
#pr .body{display:flex;border:0.5px solid #e5e7eb;border-top:none;min-height:360px}
#pr .arrs{width:200px;flex:none;border-right:0.5px solid #e5e7eb;overflow:auto;max-height:520px}
#pr .arr{padding:9px 12px;border-bottom:0.5px solid #eee;cursor:pointer;border-left:3px solid transparent}
#pr .arr.on{background:#eaf0f7;border-left-color:var(--gold)}
#pr .arr .n{font-size:12px;font-weight:500}
#pr .arr .m{font-size:10px;color:#6b7280}
#pr .det{flex:1;min-width:0}
#pr table{width:100%;border-collapse:collapse;font-size:11px}
#pr th{text-align:left;color:#6b7280;padding:6px 6px;border-bottom:0.5px solid #eee}
#pr td{padding:7px 6px;border-bottom:0.5px solid #f0f0f0;vertical-align:top}
#pr .pill{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}
#pr .bx{font-size:10px;padding:2px 8px;border-radius:10px;cursor:pointer;margin:2px 3px 0 0;display:inline-block;border:0.5px solid #cfd4dc;color:#374151}
#pr .push{background:#128666;color:#fff;border:none;font-weight:600;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer}
#pr .push:disabled{opacity:.45;cursor:not-allowed}
#pr .eye{cursor:pointer;color:#185fa5;font-size:14px}
#pr .panel{width:290px;flex:none;border-left:0.5px solid #e5e7eb;display:none;flex-direction:column;max-height:520px}
#pr .panel.on{display:flex}
#pr .foot{padding:10px 14px;border:0.5px solid #e5e7eb;border-top:none;border-radius:0 0 12px 12px;background:#f8f9fb;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#pr .empty{padding:22px;text-align:center;color:#9ca3af;font-size:12px}
</style>
<div id="pr">
  <div class="hd"><h1>Port Reconciliation and Stock at Port</h1><span class="chip" id="c-arr">—</span><span class="chip" id="c-flag">—</span></div>
  <div class="tb"><input id="q" placeholder="Search block / mark / vehicle" style="flex:1;min-width:140px"><span class="fl on" data-f="all">All</span><span class="fl" data-f="Matched">Matched</span><span class="fl" data-f="flag">Flagged</span><span class="fl" data-f="Resolved">Resolved</span></div>
  <div class="body"><div class="arrs" id="arrs"><div class="empty">Loading…</div></div><div class="det"><div id="detail"><div class="empty">Select an arrival</div></div></div><div class="panel" id="panel"></div></div>
  <div class="foot" id="foot"></div>
</div>
<script>
(function(){
var TOKEN=null,ARRS=[],CUR=null,DOC=null,FILT='all',Q='';
function esc(s){return (s==null?'':(''+s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function $(id){return document.getElementById(id);}
function api(dt,filters,fields,lim){var u='/api/method/frappe.client.get_list?doctype='+encodeURIComponent(dt)+'&filters='+encodeURIComponent(JSON.stringify(filters))+'&fields='+encodeURIComponent(JSON.stringify(fields))+'&limit_page_length='+(lim||0);return fetch(u,{credentials:'include'}).then(function(r){return r.json();}).then(function(j){return j.message||[];});}
function getDoc(dt,name){return fetch('/api/resource/'+encodeURIComponent(dt)+'/'+encodeURIComponent(name),{credentials:'include'}).then(function(r){return r.json();}).then(function(j){return j.data;});}
function post(method,args){return fetch('/api/method/'+method,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json','X-Frappe-CSRF-Token':TOKEN},body:JSON.stringify(args)}).then(function(r){return r.json();});}
var SC={'Matched':['#eaf3de','#3b6d11'],'Resolved':['#e1f5ee','#0f6e56'],'Typo - not in DC':['#faeeda','#854f0b'],'Dimension mismatch':['#faeeda','#854f0b'],'Duplicate':['#fcebeb','#a32d2d'],'Awaiting':['#f1efe8','#5f5e5a']};
function pill(s){var c=SC[s]||['#f1efe8','#444441'];return '<span class="pill" style="background:'+c[0]+';color:'+c[1]+'">'+esc(s||'—')+'</span>';}
fetch('/api/method/dolphin_theme.api_arrivals.get_token',{credentials:'include'}).then(function(r){return r.json();}).then(function(j){TOKEN=j.message;});
function loadArrivals(){api('Port Arrival',[],['name','mark','arrival_date','shipper','total_blocks'],0).then(function(a){ARRS=a;renderArrs();if(a.length)select(a[0].name);});}
function renderArrs(){var el=$('arrs');if(!ARRS.length){el.innerHTML='<div class="empty">No arrivals</div>';return;}el.innerHTML=ARRS.map(function(a){return '<div class="arr'+(CUR===a.name?' on':'')+'" data-n="'+esc(a.name)+'"><div class="n">'+esc(a.name)+'</div><div class="m">'+esc(a.mark||'')+' \u00b7 '+esc(a.arrival_date||'')+' \u00b7 '+(a.total_blocks||0)+' blk</div></div>';}).join('');el.querySelectorAll('.arr').forEach(function(x){x.addEventListener('click',function(){select(x.dataset.n);});});$('c-arr').textContent=ARRS.length+' arrivals';}
function select(name){CUR=name;renderArrs();$('detail').innerHTML='<div class="empty">Loading\u2026</div>';closePanel();getDoc('Port Arrival',name).then(function(d){DOC=d;renderDetail();});}
function matchF(b){if(FILT==='all')return true;var s=b.recon_status||'';if(FILT==='Matched')return s==='Matched';if(FILT==='Resolved')return s==='Resolved';if(FILT==='flag')return s!=='Matched'&&s!=='Resolved';return true;}
function matchQ(b){if(!Q)return true;var t=((b.block_no||'')+' '+(b.quarry_block||'')+' '+(b.mark||'')+' '+(b.vehicle_no||'')).toLowerCase();return t.indexOf(Q)>=0;}
function dims(b){var l=b.length,w=b.width,h=b.height;if(!l&&!w&&!h)return '\u2014';return (l||'?')+'\u00d7'+(w||'?')+'\u00d7'+(h||'?');}
function recBtns(b){var st=b.recon_status||'';if(st==='Matched'||st==='Resolved')return '<span style="color:#3b6d11">\u2713</span>';var o='';if(b.suggested_block)o+='<span class="bx" style="border-color:#3b6d11;color:#3b6d11" data-act="Fixed source" data-row="'+esc(b.name)+'" data-sug="'+esc(b.suggested_block)+'">Fix \u2192 '+esc(b.suggested_block)+'</span>';if(st==='Dimension mismatch')o+='<span class="bx" data-act="Use challan" data-row="'+esc(b.name)+'">Use challan dims</span>';o+='<span class="bx" data-act="Accepted as-is" data-row="'+esc(b.name)+'">Accept as-is</span>';if(st==='Duplicate')o+='<span class="bx" style="border-color:#a32d2d;color:#a32d2d" data-act="Removed (duplicate)" data-row="'+esc(b.name)+'">Remove dup</span>';return o;}
function renderDetail(){if(!DOC)return;var all=DOC.blocks||[];var blks=all.filter(matchF).filter(matchQ);var flags=all.filter(function(b){var s=b.recon_status||'';return s!=='Matched'&&s!=='Resolved';}).length;$('c-flag').textContent=flags+' flags open';var h='<div style="padding:8px 12px;font-size:12px;color:#374151;border-bottom:0.5px solid #eee;display:flex;align-items:center;gap:10px;flex-wrap:wrap"><b>'+esc(DOC.name)+'</b><span>'+esc(DOC.mark||'')+'</span><span>'+esc(DOC.arrival_date||'')+'</span><span>'+all.length+' blocks</span></div>';if(!blks.length){$('detail').innerHTML=h+'<div class="empty">No blocks match filter</div>';wireFoot();return;}h+='<table><thead><tr><th style="width:22px"></th><th>Block</th><th>Dims (L\u00d7W\u00d7H)</th><th>CBM</th><th>Status</th><th>DC</th><th>Reconcile</th><th></th></tr></thead><tbody>';blks.forEach(function(b){var st=b.recon_status||'';var canPush=(st==='Matched'||st==='Resolved');h+='<tr><td>'+(canPush?'<input type="checkbox" class="ck" data-row="'+esc(b.name)+'">':'')+'</td><td><b>'+esc(b.block_no||'')+'</b>'+(b.quarry_block?'<div style="font-size:9px;color:#9ca3af">'+esc(b.quarry_block)+'</div>':'')+'</td><td>'+dims(b)+'</td><td>'+(b.cbm||'\u2014')+'</td><td>'+pill(st)+'</td><td style="font-size:10px">'+esc(b.matched_dc||'\u2014')+'</td><td>'+recBtns(b)+'</td><td><span class="eye" data-row="'+esc(b.name)+'">\uD83D\uDC41</span></td></tr>';});h+='</tbody></table>';$('detail').innerHTML=h;wireDetail();wireFoot();}
function wireDetail(){$('detail').querySelectorAll('.ck').forEach(function(c){c.addEventListener('change',updFoot);});$('detail').querySelectorAll('.bx').forEach(function(x){x.addEventListener('click',function(){reconcile(x.dataset.row,x.dataset.act,x.dataset.sug);});});$('detail').querySelectorAll('.eye').forEach(function(x){x.addEventListener('click',function(){openPanel(x.dataset.row);});});}
function reconcile(rowName,act,sug){var upd={};if(act==='Fixed source'&&sug)upd.block_no=sug;post('dolphin_theme.api_arrivals.resolve_flag',{arrival:CUR,row_name:rowName,resolution_type:act,updates:upd}).then(function(){select(CUR);});}
function checkedRows(){return [].map.call($('detail').querySelectorAll('.ck:checked'),function(c){return c.dataset.row;});}
function updFoot(){var n=checkedRows().length;var b=$('pushbtn');if(b){b.disabled=!n;b.textContent='Push '+n+' block'+(n===1?'':'s')+' \u2192 Shipment Lot';}}
function wireFoot(){$('foot').innerHTML='<button class="push" id="pushbtn" disabled>Push \u2192 Shipment Lot</button><span style="font-size:11px;color:#6b7280">Tick matched / resolved blocks, then push. Nothing is pre-selected.</span>';$('pushbtn').addEventListener('click',doPush);updFoot();}
function doPush(){var names=checkedRows();if(!names.length)return;var map={};(DOC.blocks||[]).forEach(function(b){map[b.name]=b;});var rows=names.map(function(nm){var b=map[nm];return {quarry_block:b.quarry_block,block_no:b.block_no,length:b.length,width:b.width,height:b.height,cbm:b.cbm,mt:b.net_wt,kgs:(b.net_wt||0)*1000,matched_dc:b.matched_dc,arrival:CUR};});$('pushbtn').disabled=true;$('pushbtn').textContent='Creating\u2026';post('dolphin_theme.api_arrivals.create_shipment_lot',{consignee:DOC.shipper||DOC.mark||'',rows:rows,mark:DOC.mark||'',vessel:DOC.vessel||''}).then(function(j){var lot=(j.message&&(j.message.name||j.message))||'';$('foot').innerHTML='<span style="font-size:12px;color:#0f6e56">\u2713 Created '+esc(lot)+'</span> <a href="/app/export-shipment-lot/'+encodeURIComponent(lot)+'" target="_blank" class="bx" style="border-color:#128666;color:#128666">Open lot</a> <span class="bx" id="again">Push more</span>';var a=document.getElementById('again');if(a)a.addEventListener('click',function(){select(CUR);});}).catch(function(){$('foot').innerHTML='<span style="color:#a32d2d">Error creating lot</span>';});}
function openPanel(rowName){var b=(DOC.blocks||[]).filter(function(x){return x.name===rowName;})[0];if(!b)return;var p=$('panel');p.classList.add('on');var dt,nm,fmt;if(b.matched_dc){dt='Delivery Challan';nm=b.matched_dc;fmt='Dolphin Delivery Challan';}else{dt='Port Arrival';nm=CUR;fmt='';}var src='/printview?doctype='+encodeURIComponent(dt)+'&name='+encodeURIComponent(nm)+(fmt?'&format='+encodeURIComponent(fmt):'')+'&no_letterhead=0&_lang=en';p.innerHTML='<div style="padding:8px 10px;background:#f4f6f9;border-bottom:0.5px solid #e5e7eb;display:flex;align-items:center;gap:8px;font-size:11px"><b style="flex:1">'+esc(b.block_no||'')+' \u00b7 '+esc(dt)+'</b><span class="bx" id="pclose">Close</span></div><iframe src="'+src+'" style="flex:1;border:none;width:100%"></iframe>';document.getElementById('pclose').addEventListener('click',closePanel);}
function closePanel(){var p=$('panel');p.classList.remove('on');p.innerHTML='';}
$('q').addEventListener('input',function(){Q=this.value.trim().toLowerCase();renderDetail();});
[].forEach.call(document.querySelectorAll('#pr .fl'),function(f){f.addEventListener('click',function(){FILT=f.dataset.f;document.querySelectorAll('#pr .fl').forEach(function(x){x.classList.remove('on');});f.classList.add('on');renderDetail();});});
loadArrivals();
})();
</script>
{% endraw %}
