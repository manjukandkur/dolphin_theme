{% extends "templates/web.html" %}

{% block title %}Dolphin ERP{% endblock %}

{% block head_include %}
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0F2540">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dolphin">
<link rel="manifest" href="/dolphin_manifest.json">
<link rel="apple-touch-icon" href="/dolphin_icon.svg">
<style>
  header, .navbar, .web-footer, footer, .footer, .page-head, .breadcrumb-container,
  #navbar, .navbar-light, .website-footer { display: none !important; }
  html, body { margin: 0 !important; padding: 0 !important; background: #0F2540 !important; }
  main, .main-section, #body, .container, .page_content { max-width: none !important; margin: 0 !important; padding: 0 !important; }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  :root { --navy:#0F2540; --gold:#C9A44C; --paper:#F4F6F9; }
  #dolphin-app { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color:#12233b;
    background:var(--paper); min-height:100vh; min-height:100dvh; max-width:560px; margin:0 auto;
    display:flex; flex-direction:column; padding-bottom:80px; }
  #dolphin-app svg { width:1em; height:1em; stroke:currentColor; stroke-width:2; fill:none;
    stroke-linecap:round; stroke-linejoin:round; }
  .d-top { background:var(--navy); color:#fff; padding:calc(14px + env(safe-area-inset-top)) 18px 16px;
    border-bottom-left-radius:20px; border-bottom-right-radius:20px; }
  .d-top .row { display:flex; align-items:center; justify-content:space-between; }
  .d-brand { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:600; }
  .d-logo { width:30px; height:30px; border-radius:9px; background:var(--gold); color:var(--navy);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-family:Georgia,serif; font-size:14px; }
  .d-user { font-size:12.5px; opacity:.85; }
  .d-search { margin-top:14px; display:flex; align-items:center; gap:9px; background:rgba(255,255,255,.12);
    border-radius:22px; padding:11px 15px; color:#cdd8e6; font-size:14px; text-decoration:none; }
  .d-search svg { font-size:17px; }
  .d-wrap { padding:4px 16px 0; }
  .d-h { font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:#6b7a90; margin:20px 4px 10px; }
  .d-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:11px; }
  .d-tile { background:#fff; border:1px solid #e7ecf2; border-radius:15px; padding:16px 6px; text-align:center;
    text-decoration:none; color:#12233b; transition:transform .06s ease; }
  .d-tile:active { transform:scale(.96); }
  .d-tile .ic { font-size:24px; color:var(--navy); }
  .d-tile .lb { font-size:11.5px; margin-top:8px; font-weight:500; }
  .d-stat { display:flex; gap:11px; }
  .d-card { flex:1; background:#fff; border:1px solid #e7ecf2; border-radius:15px; padding:14px 16px; }
  .d-card .n { font-size:23px; font-weight:700; color:var(--navy); }
  .d-card .l { font-size:11.5px; color:#6b7a90; margin-top:2px; }
  .d-recent { margin-top:11px; background:#fff; border:1px solid #e7ecf2; border-radius:15px; padding:14px 16px;
    display:flex; align-items:center; gap:11px; color:#33445c; font-size:13px; text-decoration:none; }
  .d-recent svg { font-size:18px; color:var(--navy); }
  .d-install { margin:18px 4px 0; display:none; width:calc(100% - 8px); background:var(--navy); color:#fff; border:none;
    border-radius:14px; padding:14px; font-size:15px; font-weight:600; }
  .d-hint { margin:16px 6px 4px; font-size:12px; color:#7c8aa0; line-height:1.5; display:none; }
  .d-nav { position:fixed; bottom:0; left:0; right:0; max-width:560px; margin:0 auto; background:#fff;
    border-top:1px solid #e7ecf2; display:flex; justify-content:space-around;
    padding:9px 0 calc(10px + env(safe-area-inset-bottom)); z-index:50; }
  .d-nav a { text-decoration:none; color:#9aa7b8; text-align:center; font-size:10.5px; }
  .d-nav a.on { color:var(--navy); }
  .d-nav a .ic { font-size:22px; display:block; margin-bottom:3px; }
  .d-gate { padding:70px 28px; text-align:center; color:#fff; }
  .d-gate .g-logo { width:76px; height:76px; border-radius:20px; background:var(--gold); color:var(--navy);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-family:Georgia,serif; font-size:32px; margin:0 auto 22px; }
  .d-gate h1 { font-size:22px; margin:0 0 8px; font-weight:600; }
  .d-gate p { color:#a9b6c8; font-size:14px; margin:0 0 26px; }
  .d-gate a { display:inline-block; background:var(--gold); color:var(--navy); text-decoration:none;
    padding:13px 34px; border-radius:14px; font-weight:600; font-size:15px; }
</style>
{% endblock %}

{% block page_content %}
<div id="dolphin-app">
  <div class="d-gate"><div class="g-logo">DI</div><p style="color:#a9b6c8">Loading…</p></div>
</div>
{% endblock %}

{% block script %}
<script>
(function () {
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/dolphin_sw.js", { scope: "/" }).catch(function () {});
  }
  var app = document.getElementById("dolphin-app");
  var P = '<svg viewBox="0 0 24 24">';
  var ICON = {
    box:   P+'<path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>',
    clip:  P+'<rect x="8" y="3" width="8" height="4" rx="1"/><path d="M8 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><path d="M9 13l2 2 4-4"/></svg>',
    user:  P+'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>',
    truck: P+'<path d="M3 6h11v9H3zM14 9h4l3 3v3h-7"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>',
    stack: P+'<path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 12l9 5 9-5M3 16l9 5 9-5"/></svg>',
    calc:  P+'<rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 7h8M8 11h.01M12 11h.01M16 11h.01M8 15h.01M12 15h.01M16 15h4"/></svg>',
    search:P+'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>',
    home:  P+'<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>',
    grid:  P+'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>'
  };
  function esc(s){ return (s||"").replace(/[<>&]/g,function(c){return {"<":"&lt;",">":"&gt;","&":"&amp;"}[c];}); }

  function gate() {
    app.innerHTML =
      '<div class="d-gate"><div class="g-logo">DI</div>' +
      '<h1>Dolphin ERP</h1><p>Sign in to your Dolphin account to continue.</p>' +
      '<a href="/login?redirect-to=/m">Sign in</a></div>';
  }
  function tile(href, ic, lb){
    return '<a class="d-tile" href="'+href+'"><div class="ic">'+ic+'</div><div class="lb">'+lb+'</div></a>';
  }
  function nav(href, ic, lb, on){
    return '<a class="'+(on?"on":"")+'" href="'+href+'"><span class="ic">'+ic+'</span>'+lb+'</a>';
  }

  function shell(user, stock) {
    var blocks = (stock && stock.blocks != null) ? stock.blocks : "–";
    app.innerHTML =
      '<div class="d-top"><div class="row"><div class="d-brand"><div class="d-logo">DI</div>Dolphin</div>' +
      '<div class="d-user">'+esc(user)+'</div></div>' +
      '<a class="d-search" href="/app/quarry-block/view/list">'+ICON.search+'Trace block no…</a></div>' +

      '<div class="d-wrap">' +
      '<div class="d-h">Quick actions</div>' +
      '<div class="d-grid">' +
        tile("/app/quarry-block/view/list", ICON.box, "Blocks") +
        tile("/app/quarry-inspection/view/list", ICON.clip, "Quarry insp") +
        tile("/app/buyer-inspection/view/list", ICON.user, "Buyer insp") +
        tile("/app/delivery-challan/view/list", ICON.truck, "Challan") +
        tile("/production-stock", ICON.stack, "Stock") +
        tile("/sales-calc", ICON.calc, "Calc") +
      '</div>' +

      '<div class="d-h">Stock at a glance</div>' +
      '<div class="d-stat">' +
        '<div class="d-card"><div class="n">'+blocks+'</div><div class="l">blocks in stock</div></div>' +
        '<div class="d-card"><div class="n" style="color:#6b7a90;font-size:15px;padding-top:6px">production view</div><div class="l">no pricing</div></div>' +
      '</div>' +
      '<a class="d-recent" href="/production-stock">'+ICON.stack+'Open full production stock</a>' +

      '<button class="d-install" id="d-install">Add Dolphin to home screen</button>' +
      '<div class="d-hint" id="d-hint">To install: tap the Share button, then “Add to Home Screen”.</div>' +
      '</div>' +

      '<div class="d-nav">' +
        nav("/m", ICON.home, "Home", true) +
        nav("/app/quarry-block/view/list", ICON.box, "Blocks") +
        nav("/app/delivery-challan/view/list", ICON.truck, "Dispatch") +
        nav("/production-stock", ICON.stack, "Stock") +
        nav("/app", ICON.grid, "Desk") +
      '</div>';
    wireInstall();
  }

  function wireInstall() {
    var btn = document.getElementById("d-install");
    var hint = document.getElementById("d-hint");
    window.addEventListener("beforeinstallprompt", function (e) {
      e.preventDefault(); window.__dip = e;
      if (btn) { btn.style.display = "block"; btn.onclick = function () { window.__dip.prompt(); }; }
    });
    var iOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var standalone = window.navigator.standalone || window.matchMedia("(display-mode: standalone)").matches;
    if (iOS && !standalone && hint) hint.style.display = "block";
  }

  function api(method, args) {
    var u = "/api/method/" + method;
    if (args) u += "?" + Object.keys(args).map(function(k){return k+"="+encodeURIComponent(args[k]);}).join("&");
    return fetch(u, { headers: { "Accept": "application/json" }, credentials: "same-origin" })
      .then(function (r) { if (!r.ok) throw 0; return r.json(); });
  }

  api("frappe.auth.get_logged_user").then(function (r) {
    var user = r.message;
    if (!user || user === "Guest") { gate(); return; }
    var stock = {};
    api("frappe.client.get_count", { doctype: "Quarry Block", filters: JSON.stringify([["status", "=", "In Stock"]]) })
      .then(function (c) { stock.blocks = (c && c.message != null) ? c.message : "–"; })
      .catch(function(){})
      .then(function () { shell(user, stock); });
  }).catch(function () { gate(); });
})();
</script>
{% endblock %}
