<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dolphin International — Stock Dashboard</title>
<style>
  :root{--navy:#0F2540;--gold:#D4A24A;--blue:#2490ef;--ink:#1c2430;--muted:#5f6b7a;--line:#e4e8ee;--bg:#f4f6f9;--card:#fff;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;}
  a{color:var(--blue);text-decoration:none;}
  .wrap{max-width:1280px;margin:0 auto;padding:18px;}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:3px solid var(--gold);padding-bottom:12px;margin-bottom:16px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:12px;}
  .logo{width:40px;height:40px;border-radius:9px;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;}
  .brand h1{font-size:18px;margin:0;color:var(--navy);font-weight:600;}
  .brand p{font-size:12px;margin:2px 0 0;color:var(--muted);}
  .btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 13px;font-size:13px;cursor:pointer;color:var(--ink);}
  .btn:hover{background:#f0f3f7;}
  .btn.blue{background:var(--blue);color:#fff;border-color:var(--blue);}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:12px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 16px;}
  .kpi .lab{font-size:12px;color:var(--muted);margin-bottom:5px;}
  .kpi .lab i{color:var(--gold);}
  .kpi .val{font-size:25px;font-weight:600;color:var(--navy);}
  .resultbar{border-left:4px solid var(--gold);background:#fff;border:1px solid var(--line);border-left-width:4px;border-radius:0 9px 9px 0;padding:9px 14px;font-size:13px;color:var(--muted);margin-bottom:16px;}
  .resultbar b{color:var(--navy);}
  .panel{background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:16px;}
  .frow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:11px;}
  .frow:last-child{margin-bottom:0;}
  .flab{font-size:12px;color:var(--muted);min-width:118px;}
  .chip{font-size:12px;padding:4px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;}
  .chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  input[type=number],input[type=date]{height:32px;border:1px solid var(--line);border-radius:7px;padding:0 8px;font-size:13px;font-family:inherit;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;}
  .seg button{border:0;padding:5px 12px;font-size:12px;cursor:pointer;background:#fff;color:var(--muted);}
  .seg button.on{background:var(--navy);color:#fff;}
  .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:16px;}
  .chart h3{font-size:13px;margin:0 0 12px;color:var(--navy);font-weight:600;}
  .bar{display:flex;align-items:center;gap:9px;margin-bottom:8px;font-size:12px;}
  .bar .bl{width:64px;color:var(--muted);text-align:right;flex:none;}
  .bar .bt{flex:1;background:#eef1f5;border-radius:5px;height:18px;overflow:hidden;}
  .bar .bf{height:100%;border-radius:5px;}
  .bar .bv{width:62px;color:var(--ink);font-weight:600;flex:none;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{text-align:left;padding:9px 10px;font-weight:600;color:var(--muted);background:#f7f9fb;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;position:sticky;top:0;}
  td{padding:8px 10px;border-bottom:1px solid #eef1f5;white-space:nowrap;}
  .tag{font-size:11px;padding:2px 8px;border-radius:999px;}
  .tablewrap{background:#fff;border:1px solid var(--line);border-radius:11px;overflow:auto;max-height:560px;}
  .muted{color:var(--muted);font-size:12px;}
  .center{text-align:center;padding:40px;color:var(--muted);}
  .seghd{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin-bottom:10px;}
  .seghd button{border:0;padding:7px 16px;font-size:13px;cursor:pointer;background:#fff;color:var(--muted);}
  .seghd button.on{background:var(--navy);color:#fff;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="logo">DI</div>
      <div><h1>Dolphin International — stock dashboard</h1><p id="sub">Loading live stock…</p></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" id="reload">Reload</button>
      <button class="btn" id="reset">Reset filters</button>
    </div>
  </div>

  <div id="app"><div class="center">Loading live stock data…</div></div>
</div>

<script>
(function(){
  var NAVY="#0F2540", GOLD="#D4A24A", BLUE="#2490ef";
  var STATUS_COLORS={"In Stock":"#1D9E75","Buyer Marked":"#EF9F27","In Delivery Challan":"#378ADD","At Port":"#7F77DD","At Bannikoppa Station yard":"#D85A30","Shipped":"#888780"};
  var GRADE_COLORS={"A":"#1D9E75","B":"#378ADD","C":"#EF9F27","D":"#D85A30","B1":"#7F77DD","B2":"#534AB7","Unshaped":"#888780","Unshaped ":"#888780"};
  function gcol(g){return GRADE_COLORS[g]||"#888780";}
  function scol(s){return STATUS_COLORS[s]||"#888780";}
  var blocks=[], sel={grade:new Set(),size:new Set(),pit:new Set(),status:new Set()},
      vol={min:null,max:null}, dims={L:null,W:null,H:null,tol:10}, sizeMode="gte",
      period={from:null,to:null}, sort={key:"ton",dir:-1};
  function fmt(n){return (Math.round(n)).toLocaleString();}
  function uniq(arr){return [...new Set(arr)].filter(function(x){return x!==null&&x!==undefined&&x!=="";});}

  async function load(){
    var fields=JSON.stringify(["name","block_number","length_gross","width_gross","height_gross","gross_volume","gross_tonnage","status","pit","granite_quality_grade","granite_size_category","date_produced","gangman"]);
    var url="/api/method/frappe.client.get_list?doctype=Quarry%20Block&fields="+encodeURIComponent(fields)+"&limit_page_length=0&order_by=block_number%20asc";
    var r=await fetch(url,{credentials:"include",headers:{"Accept":"application/json"}});
    if(!r.ok) throw new Error("HTTP "+r.status);
    var j=await r.json();
    blocks=(j.message||[]).map(function(b){
      return {id:b.block_number||b.name, pit:(b.pit==null?"—":String(b.pit)), grade:(b.granite_quality_grade||"—").trim()||"—",
        size:(b.granite_size_category||"—"), status:b.status||"—", date:b.date_produced||"",
        L:+b.length_gross||0, W:+b.width_gross||0, H:+b.height_gross||0,
        vol:+b.gross_volume||0, ton:+b.gross_tonnage||0, gangman:b.gangman||""};
    });
  }

  function dimOk(bv,q){ if(q==null)return true; return sizeMode==="gte"?bv>=q:Math.abs(bv-q)<=(dims.tol==null?10:dims.tol); }
  function filtered(){
    return blocks.filter(function(b){
      if(sel.grade.size&&!sel.grade.has(b.grade))return false;
      if(sel.size.size&&!sel.size.has(b.size))return false;
      if(sel.pit.size&&!sel.pit.has(b.pit))return false;
      if(sel.status.size&&!sel.status.has(b.status))return false;
      if(vol.min!=null&&b.vol<vol.min)return false;
      if(vol.max!=null&&b.vol>vol.max)return false;
      if(!dimOk(b.L,dims.L)||!dimOk(b.W,dims.W)||!dimOk(b.H,dims.H))return false;
      if(period.from&&b.date&&b.date<period.from)return false;
      if(period.to&&b.date&&b.date>period.to)return false;
      return true;
    });
  }

  function chip(dim,val){var on=sel[dim].has(val);return '<button class="chip'+(on?' on':'')+'" data-dim="'+dim+'" data-val="'+String(val).replace(/"/g,'&quot;')+'">'+val+'</button>';}
  function barRow(label,count,max,color){var pct=max?Math.round(count/max*100):0;
    return '<div class="bar"><span class="bl">'+label+'</span><span class="bt"><span class="bf" style="width:'+pct+'%;background:'+color+'"></span></span><span class="bv">'+count+'</span></div>';}

  function render(){
    var grades=uniq(blocks.map(function(b){return b.grade;})).sort();
    var sizes=uniq(blocks.map(function(b){return b.size;})).sort();
    var pits=uniq(blocks.map(function(b){return b.pit;})).sort(function(a,b){return (+a||999)-(+b||999);});
    var statuses=uniq(blocks.map(function(b){return b.status;}));
    var rows=filtered();
    var ton=rows.reduce(function(s,b){return s+b.ton;},0), v=rows.reduce(function(s,b){return s+b.vol;},0);
    var inStock=rows.filter(function(b){return b.status==="In Stock";}).length;

    var html='';
    html+='<div class="kpis">'+
      kpi("ti","Blocks",fmt(rows.length))+kpi("ti","In stock",fmt(inStock))+
      kpi("ti","Tonnage (t)",fmt(ton))+kpi("ti","Volume (CBM)",fmt(v))+
      kpi("ti","Avg vol / block",(rows.length?(v/rows.length).toFixed(1):"0"))+'</div>';
    var bits=[];if(period.from||period.to)bits.push("period "+(period.from||"…")+" → "+(period.to||"…"));
    html+='<div class="resultbar"><b>'+fmt(rows.length)+'</b> of '+blocks.length+' blocks match'+(bits.length?" · "+bits.join(" · "):"")+'</div>';

    html+='<div class="panel">'+
      frow("Period",'<label class="muted">From</label> <input type="date" id="dFrom"> <label class="muted">To</label> <input type="date" id="dTo">')+
      frow("Gross volume (CBM)",'≥ <input type="number" step="0.1" min="0" id="volMin" style="width:78px"> ≤ <input type="number" step="0.1" min="0" id="volMax" style="width:78px">')+
      frow("Find by size (cm)",'<span class="seg"><button id="mGte" class="'+(sizeMode==="gte"?"on":"")+'">≥ At least</button><button id="mTol" class="'+(sizeMode==="tol"?"on":"")+'">± Around</button></span> '+
        'L <input type="number" id="dL" style="width:60px"> W <input type="number" id="dW" style="width:60px"> H <input type="number" id="dH" style="width:60px"> '+
        '<span id="tolW" style="'+(sizeMode==="tol"?"":"display:none")+'">± <input type="number" id="dTol" value="10" style="width:54px"> <span class="muted">cm</span></span>')+
      '</div>';

    html+='<div class="panel">'+
      frow("Grade",grades.map(function(g){return chip("grade",g);}).join(""))+
      frow("Size",sizes.map(function(s){return chip("size",s);}).join(""))+
      frow("Pit",pits.map(function(p){return chip("pit",p);}).join(""))+
      frow("Status",statuses.map(function(s){return chip("status",s);}).join(""))+
      '</div>';

    var gmax=Math.max.apply(null,grades.map(function(g){return rows.filter(function(b){return b.grade===g;}).length;}).concat([1]));
    var smax=Math.max.apply(null,statuses.map(function(s){return rows.filter(function(b){return b.status===s;}).length;}).concat([1]));
    var pmax=Math.max.apply(null,pits.map(function(p){return rows.filter(function(b){return b.pit===p;}).length;}).concat([1]));
    html+='<div class="charts">'+
      '<div class="panel chart"><h3>Blocks by grade</h3>'+grades.map(function(g){return barRow(g,rows.filter(function(b){return b.grade===g;}).length,gmax,gcol(g));}).join("")+'</div>'+
      '<div class="panel chart"><h3>Blocks by status</h3>'+statuses.map(function(s){return barRow(s.length>14?s.slice(0,13)+"…":s,rows.filter(function(b){return b.status===s;}).length,smax,scol(s));}).join("")+'</div>'+
      '<div class="panel chart"><h3>Blocks by pit</h3>'+pits.map(function(p){return barRow("Pit "+p,rows.filter(function(b){return b.pit===p;}).length,pmax,BLUE);}).join("")+'</div>'+
      '</div>';

    html+='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px;"><div class="muted" id="rc">'+rows.length+' blocks</div><div class="muted">Click a column to sort</div></div>';
    html+='<div class="tablewrap"><table><thead id="th"></thead><tbody id="tb"></tbody></table></div>';

    document.getElementById("app").innerHTML=html;
    bindFilters();
    renderTable(rows);
    restoreInputs();
  }

  function kpi(i,l,v){return '<div class="kpi"><div class="lab">'+l+'</div><div class="val">'+v+'</div></div>';}
  function frow(lab,inner){return '<div class="frow"><span class="flab">'+lab+'</span>'+inner+'</div>';}

  function restoreInputs(){
    function set(id,val){var el=document.getElementById(id);if(el&&val!=null)el.value=val;}
    set("volMin",vol.min);set("volMax",vol.max);set("dL",dims.L);set("dW",dims.W);set("dH",dims.H);set("dTol",dims.tol);
    set("dFrom",period.from);set("dTo",period.to);
  }
  function num(id){var el=document.getElementById(id);return el&&el.value!==""?+el.value:null;}
  function bindFilters(){
    document.querySelectorAll(".chip").forEach(function(b){b.onclick=function(){var d=b.dataset.dim,v=b.dataset.val;sel[d].has(v)?sel[d].delete(v):sel[d].add(v);render();};});
    ["volMin","volMax","dL","dW","dH","dTol","dFrom","dTo"].forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener("change",function(){
      vol.min=num("volMin");vol.max=num("volMax");dims.L=num("dL");dims.W=num("dW");dims.H=num("dH");dims.tol=num("dTol");
      period.from=(document.getElementById("dFrom")||{}).value||null;period.to=(document.getElementById("dTo")||{}).value||null;render();});});
    var mg=document.getElementById("mGte"),mt=document.getElementById("mTol");
    if(mg)mg.onclick=function(){sizeMode="gte";render();};
    if(mt)mt.onclick=function(){sizeMode="tol";render();};
  }
  function renderTable(rows){
    var cols=[["id","Block"],["pit","Pit"],["grade","Grade"],["size","Size"],["dims","L×W×H"],["vol","Vol"],["ton","Tonnage"],["status","Status"],["date","Date"]];
    document.getElementById("th").innerHTML='<tr>'+cols.map(function(c){var ar=sort.key===c[0]?(sort.dir<0?" ▼":" ▲"):"";return '<th data-k="'+c[0]+'">'+c[1]+ar+'</th>';}).join("")+'</tr>';
    var sorted=rows.slice().sort(function(a,b){var k=sort.key;if(k==="dims")k="vol";var x=a[k],y=b[k];if(typeof x==="string"){return x<y?-sort.dir:x>y?sort.dir:0;}return (x-y)*sort.dir;});
    document.getElementById("rc").textContent=rows.length+" blocks";
    document.getElementById("tb").innerHTML=sorted.slice(0,400).map(function(b){
      return '<tr><td style="font-weight:600">'+b.id+'</td><td>'+b.pit+'</td><td><span class="tag" style="background:'+gcol(b.grade)+'22;color:'+gcol(b.grade)+'">'+b.grade+'</span></td><td>'+b.size+'</td><td class="muted">'+b.L+'×'+b.W+'×'+b.H+'</td><td>'+b.vol.toFixed(2)+'</td><td style="font-weight:600">'+b.ton.toFixed(2)+'</td><td><span class="tag" style="background:'+scol(b.status)+'22;color:'+scol(b.status)+'">'+b.status+'</span></td><td class="muted">'+(b.date||"")+'</td></tr>';
    }).join("")||'<tr><td colspan="9" class="center">No blocks match these filters.</td></tr>';
    document.querySelectorAll("#th th").forEach(function(th){th.onclick=function(){var k=th.dataset.k;if(sort.key===k)sort.dir*=-1;else{sort.key=k;sort.dir=(["grade","size","status","pit","id","date"].indexOf(k)>-1)?1:-1;}renderTable(filtered());};});
  }

  async function boot(){
    try{
      await load();
      document.getElementById("sub").textContent=blocks.length+" blocks · live from ERPNext";
      render();
    }catch(e){
      document.getElementById("app").innerHTML='<div class="center">Could not load stock data ('+e.message+').<br>Open this page while logged into ERPNext.</div>';
    }
  }
  document.getElementById("reload").onclick=boot;
  document.getElementById("reset").onclick=function(){sel={grade:new Set(),size:new Set(),pit:new Set(),status:new Set()};vol={min:null,max:null};dims={L:null,W:null,H:null,tol:10};period={from:null,to:null};sizeMode="gte";sort={key:"ton",dir:-1};render();};
  boot();
})();
</script>
</body>
</html>
